<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typesense Søgetest – Med24</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 40px 20px; }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { font-size: 22px; color: #333; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
    .controls { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 260px; }
    input[type=text] { width: 100%; padding: 12px 16px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; outline: none; transition: border-color .2s; }
    input[type=text]:focus { border-color: #e0004d; }
    select { padding: 11px 12px; font-size: 14px; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer; }
    .stats { font-size: 12px; color: #999; margin-bottom: 14px; min-height: 18px; }
    .results { display: flex; flex-direction: column; gap: 10px; }
    .card { background: white; border-radius: 10px; padding: 14px 16px; display: flex; gap: 14px; align-items: flex-start; box-shadow: 0 1px 4px rgba(0,0,0,.08); transition: box-shadow .15s; }
    .card:hover { box-shadow: 0 3px 12px rgba(0,0,0,.13); }
    .card img { width: 64px; height: 64px; object-fit: contain; border-radius: 6px; background: #f9f9f9; flex-shrink: 0; }
    .card-body { flex: 1; min-width: 0; }
    .card-name { font-size: 15px; font-weight: 600; color: #222; margin-bottom: 3px; }
    .card-name mark { background: #fff3c4; border-radius: 3px; padding: 0 2px; font-style: normal; }
    .card-brand { font-size: 12px; color: #e0004d; font-weight: 500; margin-bottom: 5px; }
    .card-brand mark { background: #ffe5ee; border-radius: 3px; padding: 0 2px; font-style: normal; }
    .card-cats { font-size: 11px; color: #999; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-footer { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .card-price { font-size: 17px; font-weight: 700; color: #222; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
    .badge-in { background: #e6f9ee; color: #1a7a3a; }
    .badge-out { background: #fde8e8; color: #c0392b; }
    .card-score { font-size: 11px; color: #bbb; margin-left: auto; }
    .card-link { font-size: 11px; color: #aaa; text-decoration: none; }
    .card-link:hover { color: #e0004d; }
    .empty { text-align: center; color: #aaa; padding: 40px; font-size: 15px; }
    .spinner { display: none; text-align: center; padding: 30px; color: #bbb; font-size: 14px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Typesense Søgetest</h1>
  <p class="subtitle">Tester direkte mod Typesense cluster med preset konfiguration — ikke live på sitet endnu</p>

  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="q" placeholder="Søg efter produkt, brand eller indholdsstof..." autofocus>
    </div>
    <select id="market">
      <option value="products_dk">🇩🇰 DK</option>
      <option value="products_se">🇸🇪 SE</option>
      <option value="products_no">🇳🇴 NO</option>
    </select>
  </div>

  <div class="stats" id="stats"></div>
  <div class="spinner" id="spinner">Søger...</div>
  <div class="results" id="results"></div>
</div>

<script>
const API_KEY = 'vg9DFhFXwCNxujx9U18CtGFF4bQpthgu';
const HOST = 'https://hw3ea2fxs7vnzd61p-1.a2.typesense.net';

const presetMap = {
  products_dk: 'product-search-dk',
  products_se: 'product-search-se',
  products_no: 'product-search-no',
};

const currencyMap = { products_dk: 'kr.', products_se: 'kr.', products_no: 'kr.' };

let timer;

async function search() {
  const q = document.getElementById('q').value.trim();
  const collection = document.getElementById('market').value;
  const preset = presetMap[collection];
  const currency = currencyMap[collection];

  if (!q) {
    document.getElementById('results').innerHTML = '';
    document.getElementById('stats').textContent = '';
    return;
  }

  document.getElementById('spinner').style.display = 'block';
  document.getElementById('results').innerHTML = '';

  const params = new URLSearchParams({
    q,
    preset,
    per_page: 10,
    highlight_full_fields: 'name,brand',
  });

  const res = await fetch(`${HOST}/collections/${collection}/documents/search?${params}`, {
    headers: { 'X-TYPESENSE-API-KEY': API_KEY }
  });
  const data = await res.json();
  document.getElementById('spinner').style.display = 'none';

  const found = data.found || 0;
  const ms = data.search_time_ms || 0;
  document.getElementById('stats').textContent = `${found.toLocaleString('da')} resultater på ${ms} ms`;

  if (!data.hits || data.hits.length === 0) {
    document.getElementById('results').innerHTML = '<div class="empty">Ingen resultater — prøv et andet søgeord</div>';
    return;
  }

  const html = data.hits.map(hit => {
    const d = hit.document;
    const hl = hit.highlights || [];
    const hlMap = Object.fromEntries(hl.map(h => [h.field, h.snippet || h.value || '']));

    const name = hlMap.name || d.name || '(intet navn)';
    const brand = hlMap.brand || d.brand || '';
    const cats = (d.categories || []).slice(0, 3).join(' › ');
    const price = d.price ? `${Number(d.price).toLocaleString('da', {minimumFractionDigits: 2, maximumFractionDigits: 2})} ${currency}` : '–';
    const inStock = d.in_stock;
    const score = d.ranking_score ? `Score: ${d.ranking_score}` : '';
    const img = d.image_url
      ? `<img src="${d.image_url}" alt="" onerror="this.style.display='none'">`
      : `<div style="width:64px;height:64px;background:#f0f0f0;border-radius:6px;flex-shrink:0"></div>`;
    const link = d.product_url
      ? `<a class="card-link" href="${d.product_url}" target="_blank">Åbn produkt ↗</a>`
      : '';

    return `
      <div class="card">
        ${img}
        <div class="card-body">
          <div class="card-name">${name}</div>
          ${brand ? `<div class="card-brand">${brand}</div>` : ''}
          ${cats ? `<div class="card-cats">${cats}</div>` : ''}
          <div class="card-footer">
            <span class="card-price">${price}</span>
            <span class="badge ${inStock ? 'badge-in' : 'badge-out'}">${inStock ? 'På lager' : 'Udsolgt'}</span>
            ${link}
            <span class="card-score">${score}</span>
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('results').innerHTML = html;
}

document.getElementById('q').addEventListener('input', () => {
  clearTimeout(timer);
  const q = document.getElementById('q').value.trim();
  if (q.length < 2) {
    document.getElementById('results').innerHTML = '';
    document.getElementById('stats').textContent = '';
    return;
  }
  timer = setTimeout(search, 250);
});

document.getElementById('market').addEventListener('change', search);
</script>
</body>
</html>
