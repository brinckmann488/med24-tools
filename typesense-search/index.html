<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typesense Søgetest – Med24</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; padding: 32px 20px; }
    .page-header { max-width: 960px; margin: 0 auto 20px; }
    h1 { font-size: 20px; color: #333; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #999; }

    /* View switcher */
    .view-switcher { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
    .view-btn { padding: 6px 14px; font-size: 13px; border: 2px solid #ddd; border-radius: 20px; background: white; cursor: pointer; color: #555; transition: all .15s; font-weight: 500; }
    .view-btn:hover { border-color: #bbb; color: #222; }
    .view-btn.active { border-color: #e0004d; background: #e0004d; color: white; }

    /* Search bar */
    .search-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 6px; }
    .search-wrap { position: relative; flex: 1; }
    input[type=text] { width: 100%; padding: 13px 18px; font-size: 16px; border: 2px solid #ddd; border-radius: 10px; outline: none; transition: border-color .2s; background: white; }
    input[type=text]:focus { border-color: #e0004d; }
    select { padding: 12px 12px; font-size: 14px; border: 2px solid #ddd; border-radius: 10px; background: white; cursor: pointer; }
    .stats { font-size: 12px; color: #bbb; margin-bottom: 16px; min-height: 18px; }

    /* ── Shared federated panel (used by A, A1, A2) ── */
    .federated-panel { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.12); display: flex; overflow: hidden; }
    .fed-left { width: 260px; flex-shrink: 0; border-right: 1px solid #f0f0f0; padding: 16px 0; }
    .fed-right { flex: 1; padding: 16px 20px; min-width: 0; }
    .fed-section-title { font-size: 11px; font-weight: 700; color: #aaa; letter-spacing: .06em; text-transform: uppercase; padding: 0 16px 10px; }
    .suggestion-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; transition: background .1s; color: #222; font-size: 14px; text-decoration: none; }
    .suggestion-item:hover { background: #f9f9f9; }
    .suggestion-item.sub-brand { padding-left: 36px; font-size: 13px; color: #666; }
    .suggestion-icon { font-size: 13px; color: #bbb; flex-shrink: 0; }
    .suggestion-text { flex: 1; min-width: 0; font-size: 13px; line-height: 1.3; }
    .suggestion-text.parent { font-weight: 600; }
    .suggestion-meta { font-size: 11px; color: #ccc; flex-shrink: 0; }
    .suggestion-arrow { font-size: 11px; color: #ddd; flex-shrink: 0; }
    .fed-products-grid { display: flex; flex-direction: column; gap: 2px; margin-bottom: 16px; }
    .fed-product { display: flex; align-items: center; gap: 12px; padding: 8px 6px; border-radius: 8px; cursor: pointer; transition: background .1s; text-decoration: none; color: inherit; }
    .fed-product:hover { background: #f9f9f9; }
    .fed-product img { width: 48px; height: 48px; object-fit: contain; border-radius: 6px; background: #f9f9f9; flex-shrink: 0; }
    .fed-product-img-placeholder { width: 48px; height: 48px; background: #f3f3f3; border-radius: 6px; flex-shrink: 0; }
    .fed-product-info { flex: 1; min-width: 0; }
    .fed-product-name { font-size: 13px; font-weight: 500; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fed-product-brand { font-size: 11px; color: #e0004d; margin-top: 1px; }
    .fed-product-price { font-size: 14px; font-weight: 700; color: #222; flex-shrink: 0; }
    .fed-divider { border: none; border-top: 1px solid #f0f0f0; margin: 12px 0; }
    .fed-see-all { display: block; text-align: center; padding: 10px; font-size: 13px; color: #e0004d; font-weight: 500; cursor: pointer; border-top: 1px solid #f5f5f5; margin-top: 8px; }
    .fed-see-all:hover { background: #fff5f8; }
    mark { background: #fff3c4; border-radius: 2px; padding: 0 2px; font-style: normal; }

    /* ── Genvej chips (A2) ── */
    .shortcut-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 16px 4px; }
    .shortcut-chip { display: inline-flex; align-items: center; gap: 4px; padding: 5px 11px; border: 1px solid #eee; border-radius: 16px; font-size: 12px; font-weight: 500; color: #555; cursor: pointer; transition: all .15s; background: #fafafa; text-decoration: none; }
    .shortcut-chip:hover { border-color: #e0004d; color: #e0004d; background: #fff5f8; }
    .shortcut-chip .chip-count { font-size: 10px; color: #ccc; font-weight: 400; }

    /* ── VIEW A3: Produkt-først ── */
    .a3-section { margin-bottom: 14px; }
    .a3-label { font-size: 11px; font-weight: 700; color: #aaa; letter-spacing: .06em; text-transform: uppercase; margin-right: 8px; }
    .a3-chips { display: inline-flex; flex-wrap: wrap; gap: 8px; vertical-align: middle; }
    .a3-chip { display: inline-block; padding: 6px 14px; border: 1px solid #e0e0e0; border-radius: 20px; font-size: 13px; font-weight: 500; color: #444; cursor: pointer; transition: all .15s; background: white; text-decoration: none; }
    .a3-chip:hover { border-color: #e0004d; color: #e0004d; background: #fff5f8; }
    .a3-chip.combo { border-style: dashed; color: #888; }
    .a3-chip.combo:hover { border-color: #e0004d; color: #e0004d; border-style: solid; }
    .grid-panel { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .grid-card { background: white; border-radius: 10px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); display: flex; flex-direction: column; gap: 8px; transition: box-shadow .15s; text-decoration: none; color: inherit; }
    .grid-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.13); }
    .grid-card img { width: 100%; aspect-ratio: 1; object-fit: contain; border-radius: 6px; background: #f9f9f9; }
    .grid-card-img-placeholder { width: 100%; aspect-ratio: 1; background: #f3f3f3; border-radius: 6px; }
    .grid-card-name { font-size: 13px; font-weight: 500; color: #222; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .grid-card-brand { font-size: 11px; color: #e0004d; font-weight: 500; }
    .grid-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
    .grid-card-price { font-size: 15px; font-weight: 700; color: #222; }
    .grid-card-stock { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .grid-card-stock.in { background: #2ecc71; }
    .grid-card-stock.out { background: #e74c3c; }

    /* Shared */
    .empty { text-align: center; color: #bbb; padding: 48px 20px; font-size: 15px; }
    .start-hint { text-align: center; color: #ccc; padding: 48px 20px; font-size: 14px; }

    /* Analytics link button */
    .analytics-link { padding: 6px 18px; font-size: 13px; border: 2px solid #e0004d; border-radius: 20px; background: white; cursor: pointer; color: #e0004d; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: all .15s; }
    .analytics-link:hover { background: #e0004d; color: white; }

    /* Hidden until correct view */
    .view-a1, .view-a2, .view-a3, .view-d, .view-e { display: none; }
    .view-a1.active, .view-a2.active, .view-a3.active, .view-d.active, .view-e.active { display: block; }
    .container { margin: 0 auto; }

    /* ── VIEW D/E: Similar/CoPurchase (unchanged) ── */
    .similar-input-bar { display: flex; gap: 10px; margin-bottom: 16px; }
    .similar-input-bar input { flex: 1; padding: 12px 16px; font-size: 15px; border: 2px solid #ddd; border-radius: 10px; outline: none; }
    .similar-input-bar input:focus { border-color: #e0004d; }
    .similar-input-bar button { padding: 12px 24px; font-size: 14px; font-weight: 600; border: none; border-radius: 10px; background: #e0004d; color: white; cursor: pointer; transition: background .15s; }
    .similar-input-bar button:hover { background: #c20040; }
    .source-product { background: white; border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; display: flex; gap: 16px; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,.1); border-left: 4px solid #e0004d; }
    .source-product img { width: 72px; height: 72px; object-fit: contain; border-radius: 8px; background: #f9f9f9; }
    .source-product-info h3 { font-size: 16px; margin-bottom: 4px; }
    .source-product-info .sp-brand { font-size: 13px; color: #e0004d; font-weight: 500; }
    .source-product-info .sp-meta { font-size: 12px; color: #999; margin-top: 4px; }
    .similar-label { font-size: 12px; font-weight: 700; color: #aaa; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 12px; }
    .similar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    @media (max-width: 700px) { .similar-grid { grid-template-columns: repeat(2, 1fr); } }
    .sim-card { background: white; border-radius: 10px; padding: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); display: flex; flex-direction: column; gap: 6px; text-decoration: none; color: inherit; transition: box-shadow .15s; position: relative; }
    .sim-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.13); }
    .sim-card img { width: 100%; aspect-ratio: 1; object-fit: contain; border-radius: 6px; background: #f9f9f9; }
    .sim-card-name { font-size: 12px; font-weight: 500; color: #222; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .sim-card-brand { font-size: 11px; color: #e0004d; }
    .sim-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
    .sim-card-price { font-size: 14px; font-weight: 700; }
    .sim-card-dist { position: absolute; top: 6px; right: 6px; font-size: 10px; color: #bbb; background: rgba(255,255,255,.85); padding: 2px 6px; border-radius: 8px; }
    .picker-dropdown { position: absolute; top: 0; left: 0; right: 0; background: white; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,.15); z-index: 10; overflow: hidden; }
    .picker-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; transition: background .1s; border-bottom: 1px solid #f5f5f5; }
    .picker-item:hover { background: #fdf5f7; }
    .picker-item:last-child { border-bottom: none; }
    .picker-item img { width: 40px; height: 40px; object-fit: contain; border-radius: 4px; background: #f9f9f9; flex-shrink: 0; }
    .picker-item-info { flex: 1; min-width: 0; }
    .picker-item-name { font-size: 13px; font-weight: 500; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .picker-item-meta { font-size: 11px; color: #999; }

    /* ── Mobile responsive ── */
    @media (max-width: 640px) {
      .federated-panel { flex-direction: column; }
      .fed-left { width: 100%; border-right: none; border-bottom: 1px solid #f0f0f0; padding: 12px 0; }
      .fed-right { padding: 12px 16px; }
      .grid-panel { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div class="page-header">
  <h1>Typesense Søgetest</h1>
  <p class="subtitle">Tester direkte mod Typesense cluster — ikke live på sitet endnu</p>
</div>

<div style="max-width:960px;margin:0 auto;">
  <!-- View switcher -->
  <div class="view-switcher">
    <button class="view-btn active" data-view="a1">A1 — Clean Split</button>
    <button class="view-btn" data-view="a2">A2 — Med Genveje</button>
    <button class="view-btn" data-view="a3">A3 — Product First</button>
    <button class="view-btn" data-view="d">D — Andre købte også</button>
    <button class="view-btn" data-view="e">E — Alternative Produkter</button>
    <a href="analytics.html" class="analytics-link" style="margin-left:auto">Analytics</a>
  </div>

  <!-- Search bar (shared) -->
  <div class="search-bar">
    <div class="search-wrap">
      <input type="text" id="q" placeholder="Søg efter produkt, brand eller indholdsstof..." autofocus>
    </div>
    <select id="market">
      <option value="products_dk">DK &mdash; Danmark</option>
      <option value="products_se">SE &mdash; Sverige</option>
      <option value="products_no">NO &mdash; Norge</option>
    </select>
  </div>
  <div class="stats" id="stats"></div>
</div>

<!-- VIEW A1: Clean Split -->
<div class="view-a1 active" id="view-a1">
  <div class="container" style="max-width:960px;">
    <div id="results-a1"></div>
  </div>
</div>

<!-- VIEW A2: Med Genveje -->
<div class="view-a2" id="view-a2">
  <div class="container" style="max-width:960px;">
    <div id="results-a2"></div>
  </div>
</div>

<!-- VIEW A3: Produkt-først -->
<div class="view-a3" id="view-a3">
  <div class="container" style="max-width:960px;">
    <div id="results-a3"></div>
  </div>
</div>

<!-- VIEW D: Andre købte også -->
<div class="view-d" id="view-d">
  <div class="container" style="max-width:960px;">
    <div class="similar-input-bar">
      <input type="text" id="copurchase-q" placeholder="Søg produkt ved navn eller ID..." autocomplete="off">
      <button onclick="searchCoPurchase()">Vis co-køb</button>
    </div>
    <div id="copurchase-picker" style="position:relative;"></div>
    <div id="copurchase-source"></div>
    <div id="copurchase-results"></div>
  </div>
</div>

<!-- VIEW E: Alternative Produkter (vector search) -->
<div class="view-e" id="view-e">
  <div class="container" style="max-width:960px;">
    <div class="similar-input-bar">
      <input type="text" id="similar-q" placeholder="Søg produkt ved navn eller ID..." autocomplete="off">
      <button onclick="searchSimilar()">Find alternativer</button>
    </div>
    <div id="similar-picker" style="position:relative;"></div>
    <div id="source-product"></div>
    <div id="similar-results"></div>
  </div>
</div>

<script>
const API_KEY = 'vg9DFhFXwCNxujx9U18CtGFF4bQpthgu';
const HOST = 'https://hw3ea2fxs7vnzd61p-1.a2.typesense.net';
const presetMap = { products_dk: 'product-search-dk', products_se: 'product-search-se', products_no: 'product-search-no' };
const currencyMap = { products_dk: 'kr.', products_se: 'kr.', products_no: 'kr.' };
const suggestionsMap = { products_dk: 'suggestions_dk', products_se: 'suggestions_se', products_no: 'suggestions_no' };

let timer;
let currentView = 'a1';
let lastData = null;
let lastQ = '';
let lastCollection = 'products_dk';

// ── View switcher ──
document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    document.querySelectorAll('.view-a1,.view-a2,.view-a3,.view-d,.view-e').forEach(v => v.classList.remove('active'));
    const hideSearch = currentView === 'd' || currentView === 'e';
    document.querySelector('.search-wrap').style.display = hideSearch ? 'none' : 'block';
    document.getElementById('stats').style.display = hideSearch ? 'none' : 'block';
    document.getElementById('view-' + currentView).classList.add('active');
    if (lastData) renderAll(lastData, lastQ, currencyMap[lastCollection]);
    else if (!document.getElementById('q').value.trim()) {
      if (['a1','a2','a3'].includes(currentView)) showPopular();
      else showHints();
    }
  });
});

// ── Helpers ──
function fmtPrice(p, currency) {
  if (!p) return '–';
  return Number(p).toLocaleString('da', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ' + currency;
}

// Group brands from brands collection by parent_brand
function groupBrands(brandDocs) {
  const parents = [];
  const childMap = {};
  for (const b of brandDocs) {
    if (b.parent_brand) {
      if (!childMap[b.parent_brand]) childMap[b.parent_brand] = [];
      childMap[b.parent_brand].push(b);
    } else {
      parents.push(b);
    }
  }
  // Build grouped list: parent followed by its children
  const result = [];
  const usedParents = new Set();
  for (const p of parents) {
    result.push({ ...p, isParent: true });
    usedParents.add(p.name);
    const children = childMap[p.name] || [];
    for (const c of children) result.push({ ...c, isChild: true });
  }
  // Orphan children whose parent wasn't in results
  for (const [parentName, children] of Object.entries(childMap)) {
    if (usedParents.has(parentName)) continue;
    result.push({ name: parentName, url: '/' + parentName.toLowerCase().replace(/[^a-z0-9æøåäöü]+/g, '-'), isParent: true, inferred: true });
    for (const c of children) result.push({ ...c, isChild: true });
  }
  return result;
}

// Fallback: extract brands from product hits (when brands collection returns nothing)
function extractBrands(hits) {
  const seen = new Set();
  const brands = [];
  for (const h of hits) {
    const b = h.document.brand;
    if (b && !seen.has(b)) { seen.add(b); brands.push(b); }
    if (brands.length >= 6) break;
  }
  return brands;
}

function renderProductRow(h, i, currency) {
  const d = h.document;
  const hl = h.highlights || [];
  const hlMap = Object.fromEntries(hl.map(x => [x.field, x.snippet || x.value || '']));
  const name = hlMap.name || d.name || '';
  const img = d.image_url
    ? `<img src="${d.image_url}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><div class="fed-product-img-placeholder" style="display:none"></div>`
    : `<div class="fed-product-img-placeholder"></div>`;
  const link = d.product_url || '#';
  return `
    <a class="fed-product" href="${link}" target="_blank" data-doc-id="${d.id}" data-pos="${i+1}">
      ${img}
      <div class="fed-product-info">
        <div class="fed-product-name">${name}</div>
        ${d.brand ? `<div class="fed-product-brand">${d.brand}</div>` : ''}
      </div>
      <div class="fed-product-price">${fmtPrice(d.price, currency)}</div>
    </a>`;
}

// ── Render brand suggestions HTML (shared by A1/A2/A3) ──
// Brands from product facet_counts (sorted by count desc by Typesense)
// FIX 27. marts 2026: Use brands from top-ranked product hits instead of facet_counts.
// Facets count ALL matched products (e.g. "magnesium" → 1395 hits → Essie, NYX).
// Top-hit brands reflect what the user actually sees (Biosym, Solaray).
function renderBrandSuggestions(data) {
  const seen = new Set();
  const brands = [];
  for (const h of (data.hits || []).slice(0, 16)) {
    const b = h.document.brand;
    if (b && !seen.has(b)) { seen.add(b); brands.push(b); }
    if (brands.length >= 6) break;
  }
  if (brands.length === 0) return '';
  return brands.map(b => `
    <div class="suggestion-item" onclick="fillSearch(${JSON.stringify(b)})">
      <span class="suggestion-icon">◆</span>
      <span class="suggestion-text">${b}</span>
    </div>`).join('');
}

// ── Render VIEW A1 (Clean Split) ──
// Mærker: fra brands collection med parent/child gruppering
// Kategorier: KUN context="category" fra suggestions (ingen brand-combos)
function renderA1(data, q, currency) {
  const el = document.getElementById('results-a1');
  if (!data.hits || data.hits.length === 0) {
    el.innerHTML = '<div class="empty">Ingen resultater</div>';
    return;
  }

  // MÆRKER: from brands collection, grouped by parent_brand
  const brandsHtml = renderBrandSuggestions(data);

  // Suggestions: alle undtagen brand-combos (kategorier + landing pages)
  const suggestions = data._suggestions || [];
  const navSuggestions = suggestions.filter(s => s.context !== 'brand');

  // Fallback: category facets from product search when no suggestions
  const facetCats = ((data.facet_counts || []).find(f => f.field_name === 'categories')?.counts || []).slice(0, 5);

  const products = data.hits.slice(0, 5);

  const catsHtml = navSuggestions.length > 0
    ? navSuggestions.slice(0, 8).map(s => `
    <a class="suggestion-item" href="https://www.med24.dk${s.url || ''}" target="_blank">
      <span class="suggestion-icon">≡</span>
      <span class="suggestion-text">${s.name}</span>
      <span class="suggestion-arrow">↗</span>
    </a>`).join('')
    : facetCats.map(c => `
    <div class="suggestion-item" onclick="fillSearch(${JSON.stringify(c.value)})">
      <span class="suggestion-icon">≡</span>
      <span class="suggestion-text">${c.value}</span>
      <span class="suggestion-arrow">↗</span>
    </div>`).join('');

  const productsHtml = products.map((h, i) => renderProductRow(h, i, currency)).join('');

  el.innerHTML = `
    <div class="federated-panel">
      <div class="fed-left">
        ${brandsHtml ? `<div class="fed-section-title">Mærker</div>${brandsHtml}` : ''}
        ${catsHtml ? `<hr class="fed-divider"><div class="fed-section-title">Forslag</div>${catsHtml}` : ''}
      </div>
      <div class="fed-right">
        <div class="fed-section-title">Produkter</div>
        <div class="fed-products-grid">${productsHtml}</div>
        <div class="fed-see-all">Se alle ${(data.found||0).toLocaleString('da')} resultater →</div>
      </div>
    </div>`;
}

// ── Render VIEW A2 (Med Genveje) ──
// Som A1, men med ekstra "Genveje"-sektion: brand+kategori combos som chips
function renderA2(data, q, currency) {
  const el = document.getElementById('results-a2');
  if (!data.hits || data.hits.length === 0) {
    el.innerHTML = '<div class="empty">Ingen resultater</div>';
    return;
  }

  const brandsHtml = renderBrandSuggestions(data);
  const suggestions = data._suggestions || [];
  const navSuggestions = suggestions.filter(s => s.context !== 'brand');
  const combos = suggestions.filter(s => s.context === 'brand')
    .sort((a, b) => (b.product_count || 0) - (a.product_count || 0));
  const facetCats = ((data.facet_counts || []).find(f => f.field_name === 'categories')?.counts || []).slice(0, 5);

  const products = data.hits.slice(0, 5);

  const catsHtml = navSuggestions.length > 0
    ? navSuggestions.slice(0, 6).map(s => `
    <a class="suggestion-item" href="https://www.med24.dk${s.url || ''}" target="_blank">
      <span class="suggestion-icon">≡</span>
      <span class="suggestion-text">${s.name}</span>
      <span class="suggestion-arrow">↗</span>
    </a>`).join('')
    : facetCats.map(c => `
    <div class="suggestion-item" onclick="fillSearch(${JSON.stringify(c.value)})">
      <span class="suggestion-icon">≡</span>
      <span class="suggestion-text">${c.value}</span>
      <span class="suggestion-arrow">↗</span>
    </div>`).join('');

  // Genveje: brand+kategori combos as clickable chips
  const combosHtml = combos.length >= 2
    ? `<hr class="fed-divider">
       <div class="fed-section-title">Genveje</div>
       <div class="shortcut-chips">
         ${combos.slice(0, 6).map(s => `
           <a class="shortcut-chip" href="https://www.med24.dk${s.url || ''}" target="_blank">
             ${s.name}
           </a>`).join('')}
       </div>`
    : '';

  const productsHtml = products.map((h, i) => renderProductRow(h, i, currency)).join('');

  el.innerHTML = `
    <div class="federated-panel">
      <div class="fed-left">
        ${brandsHtml ? `<div class="fed-section-title">Mærker</div>${brandsHtml}` : ''}
        ${catsHtml ? `<hr class="fed-divider"><div class="fed-section-title">Kategorier</div>${catsHtml}` : ''}
        ${combosHtml}
      </div>
      <div class="fed-right">
        <div class="fed-section-title">Produkter</div>
        <div class="fed-products-grid">${productsHtml}</div>
        <div class="fed-see-all">Se alle ${(data.found||0).toLocaleString('da')} resultater →</div>
      </div>
    </div>`;
}

// ── Render VIEW A3 (Produkt-først) ──
// Ingen sidepanel — chips over fuld-bredde produktgrid
function renderA3(data, q, currency) {
  const el = document.getElementById('results-a3');
  if (!data.hits || data.hits.length === 0) {
    el.innerHTML = '<div class="empty">Ingen resultater</div>';
    return;
  }

  const suggestions = data._suggestions || [];
  const navSuggestions = suggestions.filter(s => s.context !== 'brand');
  const combos = suggestions.filter(s => s.context === 'brand')
    .sort((a, b) => (b.product_count || 0) - (a.product_count || 0));
  const facetCats = ((data.facet_counts || []).find(f => f.field_name === 'categories')?.counts || []).slice(0, 5);

  const products = data.hits.slice(0, 8);

  // Brand chips from product facets (sorted by count)
  const brandFacets = ((data.facet_counts || []).find(f => f.field_name === 'brand')?.counts
    || []).slice(0, 6);
  const brandChips = brandFacets.map(f =>
    `<span class="a3-chip" onclick="fillSearch(${JSON.stringify(f.value)})">${f.value} <span style="color:#ccc;font-size:11px">${f.count}</span></span>`
  ).join('');

  // Category/suggestion chips — fallback to facets when no suggestions
  const catChips = navSuggestions.length > 0
    ? navSuggestions.slice(0, 6).map(s =>
        `<a class="a3-chip" href="https://www.med24.dk${s.url || ''}" target="_blank">${s.name}</a>`
      ).join('')
    : facetCats.map(c =>
        `<span class="a3-chip" onclick="fillSearch(${JSON.stringify(c.value)})">${c.value}</span>`
      ).join('');

  // Combo chips (dashed border to distinguish)
  const comboChips = combos.slice(0, 4).map(s =>
    `<a class="a3-chip combo" href="https://www.med24.dk${s.url || ''}" target="_blank">${s.name}</a>`
  ).join('');

  // Product grid
  const gridHtml = products.map((h, i) => {
    const d = h.document;
    const hl = h.highlights || [];
    const hlMap = Object.fromEntries(hl.map(x => [x.field, x.snippet || x.value || '']));
    const name = hlMap.name || d.name || '';
    const img = d.image_url
      ? `<img src="${d.image_url}" alt="" onerror="this.style.display='none'">`
      : `<div class="grid-card-img-placeholder"></div>`;
    const link = d.product_url || '#';
    return `<a class="grid-card" href="${link}" target="_blank" data-doc-id="${d.id}" data-pos="${i+1}">
      ${img}
      <div class="grid-card-name">${name}</div>
      ${d.brand ? `<div class="grid-card-brand">${d.brand}</div>` : ''}
      <div class="grid-card-footer">
        <span class="grid-card-price">${fmtPrice(d.price, currency)}</span>
        <span class="grid-card-stock ${d.in_stock ? 'in' : 'out'}"></span>
      </div>
    </a>`;
  }).join('');

  el.innerHTML = `
    ${brandChips ? `<div class="a3-section"><span class="a3-label">Mærker</span><div class="a3-chips">${brandChips}</div></div>` : ''}
    ${catChips ? `<div class="a3-section"><span class="a3-label">Kategorier</span><div class="a3-chips">${catChips}</div></div>` : ''}
    ${comboChips ? `<div class="a3-section"><span class="a3-label">Genveje</span><div class="a3-chips">${comboChips}</div></div>` : ''}
    <div class="grid-panel">${gridHtml}</div>
    <div class="fed-see-all" style="background:white;border-radius:0 0 10px 10px;margin-top:0;border-top:1px solid #f0f0f0;">Se alle ${(data.found||0).toLocaleString('da')} resultater →</div>`;
}

// ── Render dispatcher ──
function renderAll(data, q, currency) {
  if (currentView === 'a1') renderA1(data, q, currency);
  else if (currentView === 'a2') renderA2(data, q, currency);
  else if (currentView === 'a3') renderA3(data, q, currency);
  setTimeout(attachClickTracking, 0);
}

function showHints() {
  ['results-a1','results-a2','results-a3'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '<div class="start-hint">Begynd at skrive for at søge</div>';

// ── Popular on focus ──
let cachedPopular = null;

async function loadPopularQueries() {
  if (cachedPopular) return cachedPopular;
  const marketCode = document.getElementById('market').value.split('_')[1];
  try {
    const params = new URLSearchParams({ q: '*', sort_by: 'count:desc', per_page: 8 });
    const res = await fetch(`${HOST}/collections/analytics_popular_${marketCode}/documents/search?${params}`, {
      headers: { 'X-TYPESENSE-API-KEY': API_KEY }
    });
    if (!res.ok) return [];
    const data = await res.json();
    cachedPopular = (data.hits || []).map(h => h.document.q).filter(Boolean);
    return cachedPopular;
  } catch { return []; }
}

async function showPopular() {
  const queries = await loadPopularQueries();
  // Update all A-variant views with popular queries
  const viewIds = ['results-a1','results-a2','results-a3'];
  for (const id of viewIds) {
    const el = document.getElementById(id);
    if (!el) continue;
    if (!queries.length) {
      el.innerHTML = '<div class="start-hint">Begynd at skrive for at søge</div>';
      continue;
    }
    const itemsHtml = queries.map(q => `
      <div class="suggestion-item" onclick="fillSearch(${JSON.stringify(q)})">
        <span class="suggestion-icon" style="color:#e0004d">↑</span>
        <span class="suggestion-text">${q}</span>
        <span class="suggestion-arrow">↗</span>
      </div>`).join('');

    if (id === 'results-a3') {
      // A3: show as chips instead of panel
      const chipsHtml = queries.map(q => `<span class="a3-chip" onclick="fillSearch(${JSON.stringify(q)})">${q}</span>`).join('');
      el.innerHTML = `<div class="a3-section"><span class="a3-label">Populære søgninger</span><div class="a3-chips">${chipsHtml}</div></div>`;
    } else {
      el.innerHTML = `
        <div class="federated-panel">
          <div class="fed-left">
            <div class="fed-section-title">Populære søgninger</div>
            ${itemsHtml}
          </div>
          <div class="fed-right" style="display:flex;align-items:center;justify-content:center;">
            <div style="color:#ccc;font-size:14px;text-align:center;padding:24px;">Klik på en søgning<br>eller begynd at skrive</div>
          </div>
        </div>`;
    }
  }
}

function fillSearch(q) {
  document.getElementById('q').value = q;
  search();
}

// ── Search (federated multi_search) ──
async function search() {
  const q = document.getElementById('q').value.trim();
  const collection = document.getElementById('market').value;
  const preset = presetMap[collection];
  const currency = currencyMap[collection];
  const suggestionsCollection = suggestionsMap[collection];
  lastCollection = collection;
  lastQ = q;

  if (!q) { lastData = null; showHints(); return; }

  try {
    const res = await fetch(`${HOST}/multi_search`, {
      method: 'POST',
      headers: { 'X-TYPESENSE-API-KEY': API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ searches: [
        { collection, q, preset, per_page: 12, highlight_full_fields: 'name,brand', facet_by: 'categories,brand', max_facet_values: 10 },
        { collection: suggestionsCollection, q, query_by: 'name', per_page: 30, highlight_fields: 'name' },
        { collection: 'brands', q, query_by: 'name', per_page: 10, highlight_fields: 'name' }
      ]})
    });
    const multi = await res.json();
    const [productsData, suggestionsData, brandsData] = multi.results || [];

    const data = productsData || { hits: [], found: 0 };
    data._suggestions = (suggestionsData?.hits || []).map(h => h.document);
    data._brands = (brandsData?.hits || []).map(h => h.document);
    lastData = data;

    const found = data.found || 0;
    const totalMs = (productsData?.search_time_ms || 0) + (suggestionsData?.search_time_ms || 0) + (brandsData?.search_time_ms || 0);
    document.getElementById('stats').textContent = found > 0
      ? `${found.toLocaleString('da')} resultater på ${totalMs} ms (multi_search)`
      : `Ingen resultater · ${totalMs} ms`;

    renderAll(data, q, currency);
  } catch (e) {
    document.getElementById('stats').textContent = 'Fejl ved søgning';
    console.error('multi_search error:', e);
  }
}

document.getElementById('q').addEventListener('input', () => {
  clearTimeout(timer);
  const q = document.getElementById('q').value.trim();
  if (q.length < 2) {
    lastData = null;
    if (['a1','a2','a3'].includes(currentView)) showPopular();
    else showHints();
    return;
  }
  timer = setTimeout(search, 200);
});

document.getElementById('q').addEventListener('focus', () => {
  if (!document.getElementById('q').value.trim() && ['a1','a2','a3'].includes(currentView)) showPopular();
});

document.getElementById('market').addEventListener('change', () => {
  cachedPopular = null;
  const q = document.getElementById('q').value.trim();
  if (q.length >= 2) search();
  else if (['a1','a2','a3'].includes(currentView)) showPopular();
});

// ── Click tracking ──
function trackClick(docId, position) {
  if (!lastQ) return;
  const userId = localStorage.getItem('ts_uid') || (() => {
    const id = 'u' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('ts_uid', id);
    return id;
  })();
  fetch(`${HOST}/analytics/events`, {
    method: 'POST',
    headers: { 'X-TYPESENSE-API-KEY': API_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'search_click', data: { q: lastQ, doc_id: String(docId), user_id: userId, position } })
  }).catch(() => {});
}

function attachClickTracking() {
  document.querySelectorAll('[data-doc-id]').forEach(el => {
    el.addEventListener('click', () => trackClick(el.dataset.docId, parseInt(el.dataset.pos)));
  });
}

// ── VIEW E: Alternative Produkter (vector search) ──
let similarSelectedId = null;
let similarTimer = null;

// Typeahead: search products by name as user types
document.getElementById('similar-q').addEventListener('input', () => {
  clearTimeout(similarTimer);
  const q = document.getElementById('similar-q').value.trim();
  if (q.length < 2) { closePicker(); return; }
  // If input is purely numeric, treat as direct ID
  if (/^\d+$/.test(q)) { closePicker(); similarSelectedId = q; return; }
  similarTimer = setTimeout(() => searchPicker(q), 200);
});

document.getElementById('similar-q').addEventListener('keydown', e => {
  if (e.key === 'Enter') { closePicker(); searchSimilar(); }
});

// Close picker when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('#similar-picker') && !e.target.closest('#similar-q')) closePicker();
});

function closePicker() {
  document.getElementById('similar-picker').innerHTML = '';
}

async function searchPicker(q) {
  const collection = document.getElementById('market').value;
  const currency = currencyMap[collection];
  const params = new URLSearchParams({ q, query_by: 'name,brand', per_page: 6, exclude_fields: 'embedding', highlight_full_fields: 'name' });
  try {
    const res = await fetch(`${HOST}/collections/${collection}/documents/search?${params}`, { headers: { 'X-TYPESENSE-API-KEY': API_KEY } });
    const data = await res.json();
    if (!data.hits || data.hits.length === 0) { closePicker(); return; }
    const html = data.hits.map(h => {
      const d = h.document;
      const img = d.image_url ? `<img src="${d.image_url}" alt="" onerror="this.style.display='none'">` : '';
      return `<div class="picker-item" data-id="${d.id}">
        ${img}
        <div class="picker-item-info">
          <div class="picker-item-name">${d.name}</div>
          <div class="picker-item-meta">${d.brand || ''} · ${fmtPrice(d.price, currency)} · ID: ${d.id}</div>
        </div>
      </div>`;
    }).join('');
    const picker = document.getElementById('similar-picker');
    picker.innerHTML = `<div class="picker-dropdown">${html}</div>`;
    picker.querySelectorAll('.picker-item').forEach(el => {
      el.addEventListener('click', () => {
        similarSelectedId = el.dataset.id;
        document.getElementById('similar-q').value = el.querySelector('.picker-item-name').textContent;
        closePicker();
        searchSimilar();
      });
    });
  } catch (e) { closePicker(); }
}

async function searchSimilar() {
  const input = document.getElementById('similar-q').value.trim();
  const productId = similarSelectedId || (/^\d+$/.test(input) ? input : null);
  if (!productId) return;
  const collection = document.getElementById('market').value;
  const currency = currencyMap[collection];
  const srcEl = document.getElementById('source-product');
  const resEl = document.getElementById('similar-results');
  srcEl.innerHTML = '<div class="start-hint">Henter produkt...</div>';
  resEl.innerHTML = '';

  const headers = { 'X-TYPESENSE-API-KEY': API_KEY };

  // 1. Fetch source product
  let sourceDoc;
  try {
    const srcRes = await fetch(`${HOST}/collections/${collection}/documents/${productId}`, { headers });
    if (!srcRes.ok) { srcEl.innerHTML = '<div class="empty">Produkt ikke fundet — tjek ID og marked</div>'; return; }
    sourceDoc = await srcRes.json();
  } catch (e) { srcEl.innerHTML = '<div class="empty">Fejl ved hentning af produkt</div>'; return; }

  const srcImg = sourceDoc.image_url
    ? `<img src="${sourceDoc.image_url}" alt="" onerror="this.style.display='none'">`
    : '';
  srcEl.innerHTML = `
    <div class="source-product">
      ${srcImg}
      <div class="source-product-info">
        <h3>${sourceDoc.name || 'Ukendt'}</h3>
        ${sourceDoc.brand ? `<div class="sp-brand">${sourceDoc.brand}</div>` : ''}
        <div class="sp-meta">ID: ${sourceDoc.id} · ${fmtPrice(sourceDoc.price, currency)} · ${sourceDoc.in_stock ? 'På lager' : 'Udsolgt'}</div>
      </div>
    </div>`;

  // 2. Vector search for similar products
  resEl.innerHTML = '<div class="start-hint">Søger efter alternativer...</div>';
  try {
    const params = new URLSearchParams({
      q: '*',
      vector_query: `embedding:([], id:${productId})`,
      filter_by: `id:!=${productId}&&in_stock:true`,
      per_page: 10,
      exclude_fields: 'embedding'
    });
    const simRes = await fetch(`${HOST}/collections/${collection}/documents/search?${params}`, { headers });
    const simData = await simRes.json();

    if (!simData.hits || simData.hits.length === 0) {
      resEl.innerHTML = '<div class="empty">Ingen alternativer fundet</div>';
      return;
    }

    const cardsHtml = simData.hits.map(h => {
      const d = h.document;
      const dist = h.vector_distance != null ? (h.vector_distance).toFixed(3) : '';
      const img = d.image_url
        ? `<img src="${d.image_url}" alt="" onerror="this.style.display='none'">`
        : `<div class="grid-card-img-placeholder"></div>`;
      const link = d.product_url || '#';
      return `<a class="sim-card" href="${link}" target="_blank">
        ${dist ? `<span class="sim-card-dist">${dist}</span>` : ''}
        ${img}
        <div class="sim-card-name">${d.name || ''}</div>
        ${d.brand ? `<div class="sim-card-brand">${d.brand}</div>` : ''}
        <div class="sim-card-footer">
          <span class="sim-card-price">${fmtPrice(d.price, currency)}</span>
          <span class="grid-card-stock ${d.in_stock ? 'in' : 'out'}"></span>
        </div>
      </a>`;
    }).join('');

    resEl.innerHTML = `
      <div class="similar-label">Alternative produkter (${simData.hits.length} fundet via vektor-søgning)</div>
      <div class="similar-grid">${cardsHtml}</div>`;
  } catch (e) {
    resEl.innerHTML = '<div class="empty">Fejl ved vektor-søgning</div>';
  }
}

async function searchCoPurchase() {
  const input = document.getElementById('copurchase-q').value.trim();
  const productId = copurchaseSelectedId || (/^\d+$/.test(input) ? input : null);
  if (!productId) return;
  const collection = document.getElementById('market').value;
  const currency = currencyMap[collection];
  const srcEl = document.getElementById('copurchase-source');
  const resEl = document.getElementById('copurchase-results');
  srcEl.innerHTML = '<div class="start-hint">Henter produkt...</div>';
  resEl.innerHTML = '';

  const headers = { 'X-TYPESENSE-API-KEY': API_KEY };

  // 1. Fetch source product (including bought_together_ids)
  let sourceDoc;
  try {
    const srcRes = await fetch(`${HOST}/collections/${collection}/documents/${productId}`, { headers });
    if (!srcRes.ok) { srcEl.innerHTML = '<div class="empty">Produkt ikke fundet — tjek ID og marked</div>'; return; }
    sourceDoc = await srcRes.json();
  } catch (e) { srcEl.innerHTML = '<div class="empty">Fejl ved hentning af produkt</div>'; return; }

  const srcImg = sourceDoc.image_url
    ? `<img src="${sourceDoc.image_url}" alt="" onerror="this.style.display='none'">`
    : '';
  srcEl.innerHTML = `
    <div class="source-product">
      ${srcImg}
      <div class="source-product-info">
        <h3>${sourceDoc.name || 'Ukendt'}</h3>
        ${sourceDoc.brand ? `<div class="sp-brand">${sourceDoc.brand}</div>` : ''}
        <div class="sp-meta">ID: ${sourceDoc.id} · ${fmtPrice(sourceDoc.price, currency)} · ${sourceDoc.in_stock ? 'På lager' : 'Udsolgt'}</div>
      </div>
    </div>`;

  // 2. Check bought_together_ids — fallback to vector search if empty
  const coIds = sourceDoc.bought_together_ids || [];
  let hits = [];
  let label = '';

  if (coIds.length > 0) {
    // Primary: co-purchase data from real orders
    resEl.innerHTML = '<div class="start-hint">Henter co-køb...</div>';
    try {
      const idFilter = coIds.map(id => `id:=${id}`).join(' || ');
      const params = new URLSearchParams({
        q: '*',
        filter_by: `(${idFilter})&&in_stock:true`,
        per_page: coIds.length,
        exclude_fields: 'embedding'
      });
      const coRes = await fetch(`${HOST}/collections/${collection}/documents/search?${params}`, { headers });
      const coData = await coRes.json();
      if (coData.hits && coData.hits.length > 0) {
        const orderMap = {};
        coIds.forEach((id, i) => orderMap[id] = i);
        coData.hits.sort((a, b) => (orderMap[a.document.id] ?? 999) - (orderMap[b.document.id] ?? 999));
        hits = coData.hits;
        label = `Andre købte også (${hits.length} produkter baseret på ordredata)`;
      }
    } catch (e) {}
  }

  // Fallback: vector search (semantic similarity)
  if (hits.length === 0) {
    resEl.innerHTML = '<div class="start-hint">Finder lignende produkter via AI...</div>';
    try {
      const params = new URLSearchParams({
        q: '*',
        vector_query: `embedding:([], id:${productId})`,
        filter_by: `id:!=${productId}&&in_stock:true`,
        per_page: 10,
        exclude_fields: 'embedding'
      });
      const simRes = await fetch(`${HOST}/collections/${collection}/documents/search?${params}`, { headers });
      const simData = await simRes.json();
      if (simData.hits && simData.hits.length > 0) {
        hits = simData.hits;
        label = `Lignende produkter (${hits.length} fundet via AI — ingen ordredata endnu)`;
      }
    } catch (e) {}
  }

  if (hits.length === 0) {
    resEl.innerHTML = '<div class="empty">Ingen relaterede produkter fundet</div>';
    return;
  }

  const cardsHtml = hits.map(h => {
    const d = h.document;
    const dist = h.vector_distance != null ? `<span class="sim-card-dist">${h.vector_distance.toFixed(3)}</span>` : '';
    const img = d.image_url
      ? `<img src="${d.image_url}" alt="" onerror="this.style.display='none'">`
      : `<div class="grid-card-img-placeholder"></div>`;
    const link = d.product_url || '#';
    return `<a class="sim-card" href="${link}" target="_blank">
      ${dist}
      ${img}
      <div class="sim-card-name">${d.name || ''}</div>
      ${d.brand ? `<div class="sim-card-brand">${d.brand}</div>` : ''}
      <div class="sim-card-footer">
        <span class="sim-card-price">${fmtPrice(d.price, currency)}</span>
        <span class="grid-card-stock ${d.in_stock ? 'in' : 'out'}"></span>
      </div>
    </a>`;
  }).join('');

  resEl.innerHTML = `
    <div class="similar-label">${label}</div>
    <div class="similar-grid">${cardsHtml}</div>`;
}

showHints();
showPopular();
</script>
</body>
</html>
