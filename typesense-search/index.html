<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typesense Søgetest – Med24</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; padding: 32px 20px; }
    .page-header { max-width: 960px; margin: 0 auto 20px; }
    h1 { font-size: 20px; color: #333; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #999; }

    /* View switcher */
    .view-switcher { display: flex; gap: 6px; margin-bottom: 18px; }
    .view-btn { padding: 6px 14px; font-size: 13px; border: 2px solid #ddd; border-radius: 20px; background: white; cursor: pointer; color: #555; transition: all .15s; font-weight: 500; }
    .view-btn:hover { border-color: #bbb; color: #222; }
    .view-btn.active { border-color: #e0004d; background: #e0004d; color: white; }

    /* Search bar */
    .search-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 6px; }
    .search-wrap { position: relative; flex: 1; }
    input[type=text] { width: 100%; padding: 13px 18px; font-size: 16px; border: 2px solid #ddd; border-radius: 10px; outline: none; transition: border-color .2s; background: white; }
    input[type=text]:focus { border-color: #e0004d; }
    select { padding: 12px 12px; font-size: 14px; border: 2px solid #ddd; border-radius: 10px; background: white; cursor: pointer; }
    .stats { font-size: 12px; color: #bbb; margin-bottom: 16px; min-height: 18px; }

    /* ── VIEW B: Card list (current) ── */
    .view-b .container { max-width: 700px; }
    .results-b { display: flex; flex-direction: column; gap: 10px; }
    .card { background: white; border-radius: 10px; padding: 14px 16px; display: flex; gap: 14px; align-items: flex-start; box-shadow: 0 1px 4px rgba(0,0,0,.08); transition: box-shadow .15s; }
    .card:hover { box-shadow: 0 3px 12px rgba(0,0,0,.13); }
    .card img { width: 64px; height: 64px; object-fit: contain; border-radius: 6px; background: #f9f9f9; flex-shrink: 0; }
    .card-img-placeholder { width: 64px; height: 64px; background: #f0f0f0; border-radius: 6px; flex-shrink: 0; }
    .card-body { flex: 1; min-width: 0; }
    .card-name { font-size: 15px; font-weight: 600; color: #222; margin-bottom: 3px; }
    .card-brand { font-size: 12px; color: #e0004d; font-weight: 500; margin-bottom: 5px; }
    .card-cats { font-size: 11px; color: #999; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-footer { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .card-price { font-size: 17px; font-weight: 700; color: #222; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
    .badge-in { background: #e6f9ee; color: #1a7a3a; }
    .badge-out { background: #fde8e8; color: #c0392b; }
    .card-score { font-size: 11px; color: #bbb; margin-left: auto; }
    .card-link { font-size: 11px; color: #aaa; text-decoration: none; }
    .card-link:hover { color: #e0004d; }
    mark { background: #fff3c4; border-radius: 2px; padding: 0 2px; font-style: normal; }
    .brand-mark mark { background: #ffe5ee; }

    /* ── VIEW A: Federated (Matas-style) ── */
    .view-a .container { max-width: 960px; }
    .federated-panel { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.12); display: flex; overflow: hidden; }
    .fed-left { width: 260px; flex-shrink: 0; border-right: 1px solid #f0f0f0; padding: 16px 0; }
    .fed-right { flex: 1; padding: 16px 20px; min-width: 0; }
    .fed-section-title { font-size: 11px; font-weight: 700; color: #aaa; letter-spacing: .06em; text-transform: uppercase; padding: 0 16px 10px; }
    .suggestion-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; transition: background .1s; color: #222; font-size: 14px; }
    .suggestion-item:hover { background: #f9f9f9; }
    .suggestion-icon { font-size: 13px; color: #bbb; flex-shrink: 0; }
    .suggestion-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .suggestion-arrow { font-size: 11px; color: #ddd; flex-shrink: 0; }
    .fed-products-grid { display: flex; flex-direction: column; gap: 2px; margin-bottom: 16px; }
    .fed-product { display: flex; align-items: center; gap: 12px; padding: 8px 6px; border-radius: 8px; cursor: pointer; transition: background .1s; text-decoration: none; color: inherit; }
    .fed-product:hover { background: #f9f9f9; }
    .fed-product img { width: 48px; height: 48px; object-fit: contain; border-radius: 6px; background: #f9f9f9; flex-shrink: 0; }
    .fed-product-img-placeholder { width: 48px; height: 48px; background: #f3f3f3; border-radius: 6px; flex-shrink: 0; }
    .fed-product-info { flex: 1; min-width: 0; }
    .fed-product-name { font-size: 13px; font-weight: 500; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fed-product-brand { font-size: 11px; color: #e0004d; margin-top: 1px; }
    .fed-product-price { font-size: 14px; font-weight: 700; color: #222; flex-shrink: 0; }
    .fed-brands { display: flex; flex-wrap: wrap; gap: 8px; padding-top: 4px; }
    .brand-chip { display: inline-block; padding: 5px 12px; border: 1px solid #eee; border-radius: 20px; font-size: 13px; font-weight: 500; color: #444; cursor: pointer; transition: all .15s; background: #fafafa; }
    .brand-chip:hover { border-color: #e0004d; color: #e0004d; background: #fff5f8; }
    .fed-divider { border: none; border-top: 1px solid #f0f0f0; margin: 12px 0; }
    .fed-see-all { display: block; text-align: center; padding: 10px; font-size: 13px; color: #e0004d; font-weight: 500; cursor: pointer; border-top: 1px solid #f5f5f5; margin-top: 8px; }
    .fed-see-all:hover { background: #fff5f8; }

    /* ── VIEW C: Compact typeahead ── */
    .view-c .container { max-width: 700px; }
    .compact-panel { background: white; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.1); overflow: hidden; }
    .compact-section-title { font-size: 10px; font-weight: 700; color: #bbb; letter-spacing: .06em; text-transform: uppercase; padding: 10px 16px 6px; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
    .compact-row { display: flex; align-items: center; gap: 10px; padding: 9px 16px; border-bottom: 1px solid #f8f8f8; cursor: pointer; transition: background .1s; }
    .compact-row:hover { background: #fdf5f7; }
    .compact-row:last-child { border-bottom: none; }
    .compact-dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; flex-shrink: 0; }
    .compact-name { flex: 1; font-size: 14px; color: #222; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .compact-brand { font-size: 12px; color: #999; margin-left: 4px; }
    .compact-price { font-size: 14px; font-weight: 600; color: #222; flex-shrink: 0; }
    .compact-stock { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .compact-stock.in { background: #2ecc71; }
    .compact-stock.out { background: #e74c3c; }
    .compact-brands-row { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 16px; }
    .compact-brand-tag { padding: 3px 10px; background: #f5f5f5; border-radius: 12px; font-size: 12px; color: #555; cursor: pointer; }
    .compact-brand-tag:hover { background: #ffe5ee; color: #e0004d; }

    /* Shared */
    .empty { text-align: center; color: #bbb; padding: 48px 20px; font-size: 15px; }
    .start-hint { text-align: center; color: #ccc; padding: 48px 20px; font-size: 14px; }

    /* ── VIEW D: Analytics ── */
    .view-d .container { max-width: 900px; }
    .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    @media (max-width: 640px) { .analytics-grid { grid-template-columns: 1fr; } }
    .analytics-card { background: white; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,.08); overflow: hidden; }
    .analytics-card-header { padding: 14px 18px 12px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
    .analytics-card-title { font-size: 13px; font-weight: 700; color: #333; }
    .analytics-card-subtitle { font-size: 11px; color: #bbb; }
    .analytics-row { display: flex; align-items: center; gap: 10px; padding: 9px 18px; border-bottom: 1px solid #fafafa; }
    .analytics-row:last-child { border-bottom: none; }
    .analytics-rank { font-size: 11px; color: #ccc; width: 18px; flex-shrink: 0; text-align: right; }
    .analytics-query { flex: 1; font-size: 14px; color: #333; }
    .analytics-count { font-size: 12px; color: #999; background: #f5f5f5; padding: 2px 8px; border-radius: 10px; flex-shrink: 0; }
    .analytics-nohit .analytics-count { background: #fde8e8; color: #c0392b; }
    .analytics-bar-wrap { width: 60px; height: 4px; background: #f0f0f0; border-radius: 2px; flex-shrink: 0; }
    .analytics-bar { height: 4px; border-radius: 2px; background: #e0004d; }
    .analytics-empty { padding: 32px 18px; text-align: center; color: #ccc; font-size: 13px; }
    .analytics-loading { padding: 32px 18px; text-align: center; color: #ccc; font-size: 13px; }
    .analytics-meta { padding: 10px 18px; font-size: 11px; color: #bbb; background: #fafafa; border-top: 1px solid #f0f0f0; }
    .analytics-add-synonym { font-size: 11px; color: #e0004d; cursor: pointer; margin-left: 6px; opacity: 0; transition: opacity .15s; }
    .analytics-row:hover .analytics-add-synonym { opacity: 1; }
    .stat-boxes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-box { background: white; border-radius: 10px; padding: 16px 18px; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
    .stat-box-label { font-size: 11px; color: #aaa; margin-bottom: 4px; }
    .stat-box-value { font-size: 24px; font-weight: 700; color: #222; }
    .stat-box-sub { font-size: 11px; color: #bbb; margin-top: 2px; }

    /* ── VIEW D: Product grid ── */
    .view-d .container { max-width: 960px; }
    .grid-panel { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .grid-card { background: white; border-radius: 10px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); display: flex; flex-direction: column; gap: 8px; transition: box-shadow .15s; text-decoration: none; color: inherit; }
    .grid-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.13); }
    .grid-card img { width: 100%; aspect-ratio: 1; object-fit: contain; border-radius: 6px; background: #f9f9f9; }
    .grid-card-img-placeholder { width: 100%; aspect-ratio: 1; background: #f3f3f3; border-radius: 6px; }
    .grid-card-name { font-size: 13px; font-weight: 500; color: #222; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .grid-card-brand { font-size: 11px; color: #e0004d; font-weight: 500; }
    .grid-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
    .grid-card-price { font-size: 15px; font-weight: 700; color: #222; }
    .grid-card-stock { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .grid-card-stock.in { background: #2ecc71; }
    .grid-card-stock.out { background: #e74c3c; }

    /* Analytics link button — distinct style */
    .analytics-link { padding: 6px 18px; font-size: 13px; border: 2px solid #e0004d; border-radius: 20px; background: white; cursor: pointer; color: #e0004d; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: all .15s; }
    .analytics-link:hover { background: #e0004d; color: white; }

    /* Hidden until correct view */
    .view-a, .view-b, .view-c, .view-d { display: none; }
    .view-a.active, .view-b.active, .view-c.active, .view-d.active { display: block; }
    .container { margin: 0 auto; }
  </style>
</head>
<body>
<div class="page-header">
  <h1>Typesense Søgetest</h1>
  <p class="subtitle">Tester direkte mod Typesense cluster — ikke live på sitet endnu</p>
</div>

<div style="max-width:960px;margin:0 auto;">
  <!-- View switcher -->
  <div class="view-switcher">
    <button class="view-btn active" data-view="a">A — Kombineret søgning</button>
    <button class="view-btn" data-view="b">B — Kort</button>
    <button class="view-btn" data-view="c">C — Kompakt</button>
    <button class="view-btn" data-view="d">D — Produktgrid</button>
    <a href="analytics.html" class="analytics-link" style="margin-left:auto">📊 Analytics</a>
  </div>

  <!-- Search bar (shared) -->
  <div class="search-bar">
    <div class="search-wrap">
      <input type="text" id="q" placeholder="Søg efter produkt, brand eller indholdsstof..." autofocus>
    </div>
    <select id="market">
      <option value="products_dk">🇩🇰 DK</option>
      <option value="products_se">🇸🇪 SE</option>
      <option value="products_no">🇳🇴 NO</option>
    </select>
  </div>
  <div class="stats" id="stats"></div>
</div>

<!-- VIEW A: Federated -->
<div class="view-a active" id="view-a">
  <div class="container">
    <div id="results-a"></div>
  </div>
</div>

<!-- VIEW B: Card list -->
<div class="view-b" id="view-b">
  <div class="container" style="max-width:700px;">
    <div class="results-b" id="results-b"></div>
  </div>
</div>

<!-- VIEW C: Compact -->
<div class="view-c" id="view-c">
  <div class="container" style="max-width:700px;">
    <div id="results-c"></div>
  </div>
</div>

<!-- VIEW D: Product grid -->
<div class="view-d" id="view-d">
  <div class="container" style="max-width:960px;">
    <div id="results-d"></div>
  </div>
</div>


<script>
const API_KEY = 'vg9DFhFXwCNxujx9U18CtGFF4bQpthgu';
const HOST = 'https://hw3ea2fxs7vnzd61p-1.a2.typesense.net';
const presetMap = { products_dk: 'product-search-dk', products_se: 'product-search-se', products_no: 'product-search-no' };
const currencyMap = { products_dk: 'kr.', products_se: 'kr.', products_no: 'kr.' };

let timer;
let currentView = 'a';
let lastData = null;
let lastQ = '';
let lastCollection = 'products_dk';

// View switcher
document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    document.querySelectorAll('.view-a,.view-b,.view-c,.view-d').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + currentView).classList.add('active');
    if (lastData) renderAll(lastData, lastQ, currencyMap[lastCollection]);
    else if (!document.getElementById('q').value.trim()) {
      if (currentView === 'a') showPopular();
      else showHints();
    }
  });
});

function fmtPrice(p, currency) {
  if (!p) return '–';
  return Number(p).toLocaleString('da', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ' + currency;
}

function extractBrands(hits) {
  const seen = new Set();
  const brands = [];
  for (const h of hits) {
    const b = h.document.brand;
    if (b && !seen.has(b)) { seen.add(b); brands.push(b); }
    if (brands.length >= 6) break;
  }
  return brands;
}

function extractCategories(hits, maxCats = 4) {
  const seenCats = new Set();
  const cats = [];
  for (const h of hits.slice(0, 10)) {
    for (const cat of (h.document.categories || []).slice(0, 3)) {
      if (!seenCats.has(cat)) {
        seenCats.add(cat);
        cats.push(cat);
      }
      if (cats.length >= maxCats) return cats;
    }
  }
  return cats;
}

// Return top 5 diverse products (max 2 per brand)
function diverseProducts(hits, max = 5) {
  const brandCount = new Map();
  const result = [];
  for (const h of hits) {
    const brand = h.document.brand || '';
    const count = brandCount.get(brand) || 0;
    if (count < 2) {
      result.push(h);
      brandCount.set(brand, count + 1);
    }
    if (result.length >= max) break;
  }
  return result;
}

// ── Render VIEW A ──
function renderA(data, q, currency) {
  const el = document.getElementById('results-a');
  if (!data.hits || data.hits.length === 0) {
    el.innerHTML = '<div class="empty">Ingen resultater</div>';
    return;
  }

  const brands = extractBrands(data.hits);
  const cats = extractCategories(data.hits);
  const products = diverseProducts(data.hits, 5);

  // Left: brands + categories as separate sections
  const brandsLeftHtml = brands.slice(0, 4).map(b => `
    <div class="suggestion-item" onclick="fillSearch(${JSON.stringify(b)})">
      <span class="suggestion-icon">◆</span>
      <span class="suggestion-text">${b}</span>
      <span class="suggestion-arrow">↗</span>
    </div>`).join('');

  const catsHtml = cats.map(c => `
    <div class="suggestion-item" onclick="fillSearch(${JSON.stringify(c)})">
      <span class="suggestion-icon">≡</span>
      <span class="suggestion-text">${c}</span>
      <span class="suggestion-arrow">↗</span>
    </div>`).join('');

  const productsHtml = products.map((h, i) => {
    const d = h.document;
    const hl = h.highlights || [];
    const hlMap = Object.fromEntries(hl.map(x => [x.field, x.snippet || x.value || '']));
    const name = hlMap.name || d.name || '';
    const img = d.image_url
      ? `<img src="${d.image_url}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><div class="fed-product-img-placeholder" style="display:none"></div>`
      : `<div class="fed-product-img-placeholder"></div>`;
    const link = d.product_url || '#';
    return `
      <a class="fed-product" href="${link}" target="_blank" data-doc-id="${d.id}" data-pos="${i+1}">
        ${img}
        <div class="fed-product-info">
          <div class="fed-product-name">${name}</div>
          ${d.brand ? `<div class="fed-product-brand">${d.brand}</div>` : ''}
        </div>
        <div class="fed-product-price">${fmtPrice(d.price, currency)}</div>
      </a>`;
  }).join('');

  el.innerHTML = `
    <div class="federated-panel">
      <div class="fed-left">
        ${brandsLeftHtml ? `<div class="fed-section-title">Mærker</div>${brandsLeftHtml}` : ''}
        ${catsHtml ? `<hr class="fed-divider">${cats.length ? '<div class="fed-section-title">Kategorier</div>' : ''}${catsHtml}` : ''}
      </div>
      <div class="fed-right">
        <div class="fed-section-title">Produkter</div>
        <div class="fed-products-grid">${productsHtml}</div>
        <div class="fed-see-all">Se alle ${(data.found||0).toLocaleString('da')} resultater →</div>
      </div>
    </div>`;
}

// ── Render VIEW B ──
function renderB(data, q, currency) {
  const el = document.getElementById('results-b');
  if (!data.hits || data.hits.length === 0) {
    el.innerHTML = '<div class="empty">Ingen resultater — prøv et andet søgeord</div>';
    return;
  }
  el.innerHTML = data.hits.map(hit => {
    const d = hit.document;
    const hl = hit.highlights || [];
    const hlMap = Object.fromEntries(hl.map(h => [h.field, h.snippet || h.value || '']));
    const name = hlMap.name || d.name || '(intet navn)';
    const brand = hlMap.brand || d.brand || '';
    const cats = (d.categories || []).slice(0, 3).join(' › ');
    const price = fmtPrice(d.price, currency);
    const score = d.ranking_score ? `Score: ${d.ranking_score}` : '';
    const img = d.image_url
      ? `<img src="${d.image_url}" alt="" onerror="this.style.display='none'">`
      : `<div class="card-img-placeholder"></div>`;
    const pos = data.hits.indexOf(hit) + 1;
    const link = d.product_url ? `<a class="card-link" href="${d.product_url}" target="_blank" data-doc-id="${d.id}" data-pos="${pos}">Åbn produkt ↗</a>` : '';
    return `
      <div class="card">
        ${img}
        <div class="card-body">
          <div class="card-name">${name}</div>
          ${brand ? `<div class="card-brand brand-mark">${brand}</div>` : ''}
          ${cats ? `<div class="card-cats">${cats}</div>` : ''}
          <div class="card-footer">
            <span class="card-price">${price}</span>
            <span class="badge ${d.in_stock ? 'badge-in' : 'badge-out'}">${d.in_stock ? 'På lager' : 'Udsolgt'}</span>
            ${link}
            <span class="card-score">${score}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── Render VIEW C ──
function renderC(data, q, currency) {
  const el = document.getElementById('results-c');
  if (!data.hits || data.hits.length === 0) {
    el.innerHTML = '<div class="empty">Ingen resultater</div>';
    return;
  }
  const brands = extractBrands(data.hits);

  const rowsHtml = data.hits.slice(0, 12).map(h => {
    const d = h.document;
    const hl = h.highlights || [];
    const hlMap = Object.fromEntries(hl.map(x => [x.field, x.snippet || x.value || '']));
    const name = hlMap.name || d.name || '';
    const brand = d.brand || '';
    const link = d.product_url || '#';
    const pos2 = data.hits.indexOf(h) + 1;
    return `
      <a class="compact-row" href="${link}" target="_blank" style="text-decoration:none" data-doc-id="${d.id}" data-pos="${pos2}">
        <span class="compact-stock ${d.in_stock ? 'in' : 'out'}"></span>
        <span class="compact-name">${name}${brand ? `<span class="compact-brand">· ${brand}</span>` : ''}</span>
        <span class="compact-price">${fmtPrice(d.price, currency)}</span>
      </a>`;
  }).join('');

  const brandsHtml = brands.length
    ? `<div class="compact-brands-row">${brands.map(b => `<span class="compact-brand-tag">${b}</span>`).join('')}</div>`
    : '';

  el.innerHTML = `
    <div class="compact-panel">
      ${brandsHtml ? `<div class="compact-section-title">Mærker</div>${brandsHtml}` : ''}
      <div class="compact-section-title">Produkter · ${(data.found||0).toLocaleString('da')} resultater</div>
      ${rowsHtml}
    </div>`;
}

// ── Render VIEW D ──
function renderD(data, q, currency) {
  const el = document.getElementById('results-d');
  if (!data.hits || data.hits.length === 0) {
    el.innerHTML = '<div class="empty">Ingen resultater</div>';
    return;
  }
  el.innerHTML = `<div class="grid-panel">${data.hits.map((h, i) => {
    const d = h.document;
    const hl = h.highlights || [];
    const hlMap = Object.fromEntries(hl.map(x => [x.field, x.snippet || x.value || '']));
    const name = hlMap.name || d.name || '';
    const img = d.image_url
      ? `<img src="${d.image_url}" alt="" onerror="this.style.display='none'">`
      : `<div class="grid-card-img-placeholder"></div>`;
    const link = d.product_url || '#';
    return `<a class="grid-card" href="${link}" target="_blank" data-doc-id="${d.id}" data-pos="${i+1}">
      ${img}
      <div class="grid-card-name">${name}</div>
      ${d.brand ? `<div class="grid-card-brand">${d.brand}</div>` : ''}
      <div class="grid-card-footer">
        <span class="grid-card-price">${fmtPrice(d.price, currency)}</span>
        <span class="grid-card-stock ${d.in_stock ? 'in' : 'out'}"></span>
      </div>
    </a>`;
  }).join('')}</div>`;
}

function renderAll(data, q, currency) {
  if (currentView === 'a') renderA(data, q, currency);
  else if (currentView === 'b') renderB(data, q, currency);
  else if (currentView === 'c') renderC(data, q, currency);
  else if (currentView === 'd') renderD(data, q, currency);
}

function showHints() {
  document.getElementById('results-a').innerHTML = '<div class="start-hint">Begynd at skrive for at søge</div>';
  document.getElementById('results-b').innerHTML = '<div class="start-hint">Begynd at skrive for at søge</div>';
  document.getElementById('results-c').innerHTML = '<div class="start-hint">Begynd at skrive for at søge</div>';
  document.getElementById('results-d').innerHTML = '<div class="start-hint">Begynd at skrive for at søge</div>';
  document.getElementById('stats').textContent = '';
}

// ── Popular on focus (Matas-style) ──
let cachedPopular = null;

async function loadPopularQueries() {
  if (cachedPopular) return cachedPopular;
  const marketCode = document.getElementById('market').value.split('_')[1];
  try {
    const params = new URLSearchParams({ q: '*', sort_by: 'count:desc', per_page: 8 });
    const res = await fetch(`${HOST}/collections/analytics_popular_${marketCode}/documents/search?${params}`, {
      headers: { 'X-TYPESENSE-API-KEY': API_KEY }
    });
    if (!res.ok) return [];
    const data = await res.json();
    cachedPopular = (data.hits || []).map(h => h.document.q).filter(Boolean);
    return cachedPopular;
  } catch { return []; }
}

async function showPopular() {
  const queries = await loadPopularQueries();
  const el = document.getElementById('results-a');
  if (!el) return;
  if (!queries.length) {
    el.innerHTML = '<div class="start-hint">Begynd at skrive for at søge</div>';
    return;
  }
  const itemsHtml = queries.map(q => `
    <div class="suggestion-item" onclick="fillSearch(${JSON.stringify(q)})">
      <span class="suggestion-icon" style="color:#e0004d">↑</span>
      <span class="suggestion-text">${q}</span>
      <span class="suggestion-arrow">↗</span>
    </div>`).join('');
  el.innerHTML = `
    <div class="federated-panel">
      <div class="fed-left">
        <div class="fed-section-title">Populære søgninger</div>
        ${itemsHtml}
      </div>
      <div class="fed-right" style="display:flex;align-items:center;justify-content:center;">
        <div style="color:#ccc;font-size:14px;text-align:center;padding:24px;">Klik på en søgning<br>eller begynd at skrive</div>
      </div>
    </div>`;
}

function fillSearch(q) {
  document.getElementById('q').value = q;
  search();
}

async function search() {
  const q = document.getElementById('q').value.trim();
  const collection = document.getElementById('market').value;
  const preset = presetMap[collection];
  const currency = currencyMap[collection];
  lastCollection = collection;
  lastQ = q;

  if (!q) { lastData = null; showHints(); return; }

  const perPage = currentView === 'd' ? 24 : 12;
  const params = new URLSearchParams({ q, preset, per_page: perPage, highlight_full_fields: 'name,brand' });
  const res = await fetch(`${HOST}/collections/${collection}/documents/search?${params}`, {
    headers: { 'X-TYPESENSE-API-KEY': API_KEY }
  });
  const data = await res.json();
  lastData = data;

  const found = data.found || 0;
  const ms = data.search_time_ms || 0;
  document.getElementById('stats').textContent = found > 0
    ? `${found.toLocaleString('da')} resultater på ${ms} ms`
    : `Ingen resultater · ${ms} ms`;

  renderAll(data, q, currency);
  setTimeout(attachClickTracking, 0);
}

document.getElementById('q').addEventListener('input', () => {
  clearTimeout(timer);
  const q = document.getElementById('q').value.trim();
  if (q.length < 2) {
    lastData = null;
    if (currentView === 'a') showPopular();
    else showHints();
    return;
  }
  timer = setTimeout(search, 200);
});

document.getElementById('q').addEventListener('focus', () => {
  if (!document.getElementById('q').value.trim() && currentView === 'a') showPopular();
});

document.getElementById('market').addEventListener('change', () => {
  cachedPopular = null;
  const q = document.getElementById('q').value.trim();
  if (q.length >= 2) search();
  else if (currentView === 'a') showPopular();
  if (currentView === 'd') loadAnalytics();
});

// ── Click tracking ──
// Fires a search_click event to Typesense analytics when user opens a product
function trackClick(docId, position) {
  if (!lastQ) return;
  const userId = localStorage.getItem('ts_uid') || (() => {
    const id = 'u' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('ts_uid', id);
    return id;
  })();
  fetch(`${HOST}/analytics/events`, {
    method: 'POST',
    headers: { 'X-TYPESENSE-API-KEY': API_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'search_click', data: { q: lastQ, doc_id: String(docId), user_id: userId, position } })
  }).catch(() => {});
}

// Attach click tracking to result links (called after each render)
function attachClickTracking() {
  document.querySelectorAll('[data-doc-id]').forEach(el => {
    el.addEventListener('click', () => trackClick(el.dataset.docId, parseInt(el.dataset.pos)));
  });
}

// ── Analytics view ──
async function loadAnalytics() {
  const collection = document.getElementById('market').value;
  const market = collection.split('_')[1].toUpperCase();
  const marketCode = collection.split('_')[1];

  document.getElementById('nohits-market').textContent = market;
  document.getElementById('popular-market').textContent = market;
  document.getElementById('nohits-list').innerHTML = '<div class="analytics-loading">Henter...</div>';
  document.getElementById('popular-list').innerHTML = '<div class="analytics-loading">Henter...</div>';

  const headers = { 'X-TYPESENSE-API-KEY': API_KEY };

  async function fetchAnalytics(collectionName) {
    const params = new URLSearchParams({ q: '*', sort_by: 'count:desc', per_page: 20 });
    const res = await fetch(`${HOST}/collections/${collectionName}/documents/search?${params}`, { headers });
    const data = await res.json();
    return data.hits || [];
  }

  const [nohitsHits, popularHits] = await Promise.all([
    fetchAnalytics(`analytics_nohits_${marketCode}`),
    fetchAnalytics(`analytics_popular_${marketCode}`)
  ]);

  // Update stat boxes
  document.getElementById('stat-nohits').textContent = nohitsHits.length;
  document.getElementById('stat-popular').textContent = popularHits.length;

  // Render no-hits list
  const maxNohits = nohitsHits[0]?.document?.count || 1;
  document.getElementById('nohits-list').innerHTML = nohitsHits.length === 0
    ? '<div class="analytics-empty">Ingen zero-results endnu — data samles løbende</div>'
    : nohitsHits.map((h, i) => {
        const d = h.document;
        const pct = Math.round((d.count / maxNohits) * 100);
        return `<div class="analytics-row analytics-nohit">
          <span class="analytics-rank">${i + 1}</span>
          <span class="analytics-query">${d.q}<span class="analytics-add-synonym" title="Tilføj synonym">+ synonym</span></span>
          <div class="analytics-bar-wrap"><div class="analytics-bar" style="width:${pct}%"></div></div>
          <span class="analytics-count">${d.count}×</span>
        </div>`;
      }).join('');

  // Render popular list
  const maxPop = popularHits[0]?.document?.count || 1;
  document.getElementById('popular-list').innerHTML = popularHits.length === 0
    ? '<div class="analytics-empty">Ingen søgninger registreret endnu</div>'
    : popularHits.map((h, i) => {
        const d = h.document;
        const pct = Math.round((d.count / maxPop) * 100);
        return `<div class="analytics-row">
          <span class="analytics-rank">${i + 1}</span>
          <span class="analytics-query">${d.q}</span>
          <div class="analytics-bar-wrap"><div class="analytics-bar" style="width:${pct}%;background:#4a90d9"></div></div>
          <span class="analytics-count">${d.count}×</span>
        </div>`;
      }).join('');
}

// Load analytics when switching to view D
const origViewSwitch = document.querySelectorAll('.view-btn');
origViewSwitch.forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.view === 'd') loadAnalytics();
  });
});

showHints();
showPopular(); // pre-load popular queries for view A
</script>
</body>
</html>
