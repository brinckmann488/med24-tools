<!DOCTYPE html>
<html lang="no">
<head>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; color: #222; }
  header { background: #222; color: #fff; padding: 1rem 2rem; }
  header a { color: #fff; text-decoration: none; opacity: 0.7; font-size: 0.85rem; }
  header a:hover { opacity: 1; }
  header h1 { font-size: 1.25rem; margin-top: 0.25rem; }
  main { max-width: 800px; margin: 2rem auto; padding: 0 2rem; }
  main h1 { font-size: 1.5rem; margin-bottom: 0.5rem; border-bottom: 2px solid #222; padding-bottom: 0.5rem; }
  main h2 { font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 0.5rem; }
  main h3 { font-size: 1.05rem; margin-top: 1.2rem; margin-bottom: 0.4rem; }
  main p { margin: 0.5rem 0; line-height: 1.6; }
  main ul, main ol { margin: 0.5rem 0 0.5rem 1.5rem; line-height: 1.6; }
  main li { margin-bottom: 0.2rem; }
  main table { border-collapse: collapse; width: 100%; margin: 0.75rem 0; font-size: 0.9rem; }
  main th, main td { border: 1px solid #d1d5db; padding: 0.5rem 0.75rem; text-align: left; }
  main th { background: #f3f4f6; font-weight: 600; }
  main code { background: #f3f4f6; padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.85em; }
  main pre { background: #f3f4f6; padding: 1rem; border-radius: 6px; overflow-x: auto; margin: 0.75rem 0; }
  main pre code { background: none; padding: 0; }
  main blockquote { border-left: 3px solid #222; padding-left: 1rem; margin: 0.75rem 0; color: #555; }
  main strong { color: #111; }
  main a { color: #222; }
</style>
</head>
<body>
<header>
  <a href="../">&larr; Tilbake til Compliance Checker</a>
  <h1>Tiltenkt bruksomr&aring;de og ytelsessp&aring;stander</h1>
</header>
<main id="content"></main>
<script>
fetch('tiltenkt-bruksomrade.md')
  .then(r => r.text())
  .then(md => { document.getElementById('content').innerHTML = marked.parse(md); });
</script>
</body>
</html>
